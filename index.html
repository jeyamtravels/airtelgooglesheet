<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trip Sheet</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial, sans-serif;
  background:#f2f2f2;
  padding:5px;
}

.sheet{
  max-width:900px;
  margin:auto;
  background:#fff;
  border:2px solid #000;
  padding:6px;
}

h2{
  text-align:center;
  letter-spacing:1px;
  margin:2px 0 6px;
  font-size:16px;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

td{
  border:1px solid #000;
  padding:3px;
  vertical-align:top;
}

label{
  font-weight:bold;
  font-size:11px;
  display:block;
  margin-bottom:1px;
}

input, textarea{
  width:100%;
  border:none;
  outline:none;
  font-size:12px;
  padding:1px 0;
}

textarea{
  resize:none;
  line-height:1.2;
}


/* fixed widths */
.w-small{width:110px;}
.w-medium{width:130px;}
.w-large{width:270px;}

/* signature */
canvas{
  border:1px solid #000;
  width:100%;
  height:55px;   /* was 80px */
  touch-action:none;
}


.clear{
  font-size:11px;
  color:blue;
  cursor:pointer;
  margin-top:3px;
}

/* print */
@media print{
    @page{
        margin:6mm;
    }
    body{margin:0};
  body{background:#fff;}
  button{display:none;}
  h2{font-size:14px;margin:2px 0;}
  td{padding:2px;}
  canvas{height:45px;}
}

</style>
</head>

<body>
<div class="sheet">
<h2>TRIP SHEET</h2>

<table>
<tr>
<td class="w-small"><label>Service City</label><input id="service_city"></td>
<td class="w-small"><label>Organisation</label><input id="organisation"></td>
<td class="w-large"><label>Guest Name</label><input id="guest_name"></td>
</tr>
<tr>
<td class="w-small"><label>DS No</label><input id="ds_no"></td>
<td class="w-small"><label>Booking ID</label><input id="booking_id"></td>
<td class="w-large"><label>Reporting Address</label><input id="reporting_address"></td>
</tr>
</table>

<table>
<tr>
<td class="w-small"><label>Starting Date</label><input id="starting_date" type="date"></td>
<td class="w-small"><label>Starting Time</label><input id="starting_time" type="time"></td>
<td class="w-small"><label>Starting KM</label><input id="starting_km" type="number"></td>
</tr>
<tr>
<td class="w-small"><label>Closing Date</label><input id="closing_date" type="date"></td>
<td class="w-small"><label>Closing Time</label><input id="closing_time" type="time"></td>
<td class="w-small">
<label>Closing KM</label>
<input id="closing_km" type="number">
</td>
</tr>
</table>

<table>
<tr>
<td><label>Total Days</label><input id="total_days" readonly></td>
<td><label>Total Hrs</label><input id="total_hrs" readonly></td>
<td><label>Total KM</label><input id="total_km" readonly></td>
</tr>
</table>

<table>
<tr>
<td><label>Reporting Time</label><input id="reporting_time" type="time"></td>
<td><label>Car Booked</label><input id="car_booked"></td>
<td><label>Car Allotted</label><input id="car_allotted"></td>
</tr>
<tr>
<td><label>Chauffeur Name</label><input id="chauffeur_name"></td>
<td><label>Mobile No</label><input id="mobile_no"></td>
<td><label>Car No</label><input id="car_no"></td>
</tr>
</table>

<table>
<tr>
<td colspan="2">
  <label>Routing Details</label>
  <textarea id="routing_details" class="routing-box"></textarea>
</td>
<td>
  <label>Parking & Toll</label>
  <input id="parking" type="number">
</td>
</tr>
</table>

<table>
<tr>
<td width="50%">
<label>Guest Signature</label>
<canvas id="guestSign"></canvas>
</td>
<td width="50%">
<label>Chauffeur Signature</label>
<canvas id="driverSign"></canvas>
</td>
</tr>
</table>

<p style="font-size:11px">
I confirm that I am responsible for full payment of this bill if not paid by the organisation.
</p>

<button onclick="window.print()">Print Trip Sheet</button>
</div>

 <script>

const SCRIPT_URL ="https://script.google.com/macros/s/AKfycbwxPfVfZpC3v4vSgparzPI-OTopaxs8MYDfPILC38rtxpxD5RO690hrefQ74VMxGf6j/exec";

const params=new URLSearchParams(window.location.search);

const bookingId=params.get("bookingId");

if(bookingId){

fetch(`${SCRIPT_URL}?bookingId=${encodeURIComponent(bookingId)}`)

.then(r=>r.json())

.then(data=>{

if(!data.status){

alert(data.message);

return;

}

for(const key in data){

const el=document.getElementById(key);

if(el){

el.value=data[key];

}

}

calculateAll();

})

.catch(err=>{

console.log(err);

alert("Unable to load booking.");

});

}




/* CALCULATIONS */
function calculateAll(){
  const skm = +starting_km.value || 0;
  const ckm = +closing_km.value || 0;
  if (ckm >= skm) total_km.value = ckm - skm;

  if (starting_time.value && closing_time.value) {
    const [sh, sm] = starting_time.value.split(":").map(Number);
    const [ch, cm] = closing_time.value.split(":").map(Number);

    let s = sh*60 + sm;
    let e = ch*60 + cm;
    if (e < s) e += 1440;

    const hrs = (e - s) / 60;
    total_hrs.value = hrs.toFixed(2);
    total_days.value = Math.max(1, Math.ceil(hrs / 24));
  }
}

["starting_time","closing_time","starting_km","closing_km"]
.forEach(id => document.getElementById(id).addEventListener("input", calculateAll));
</script>

</body>
</html>
